services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-icloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-icloud_index}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  service:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    env_file:
      - .env
    command: uv run uvicorn icloud_index_service.main:app --host 0.0.0.0 --port 8080
    volumes:
      - .:/app
    ports:
      - "${SERVICE_PORT:-8080}:8080"
    depends_on:
      - postgres

volumes:
  postgres-data:
