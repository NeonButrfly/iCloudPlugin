services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-icloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-icloud_index}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-icloud} -d ${POSTGRES_DB:-icloud_index}
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  service:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-icloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-icloud_index}
      PLUGIN_SERVICE_URL: ${PLUGIN_SERVICE_URL:-http://127.0.0.1:8080}
      PLUGIN_API_TOKEN: ${PLUGIN_API_TOKEN:-change-me}
    command:
      - /bin/sh
      - -lc
      - uv run python -m icloud_index_service.db && uv run uvicorn icloud_index_service.main:app --host 0.0.0.0 --port 8080
    volumes:
      - .:/app
    ports:
      - "${SERVICE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
